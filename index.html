<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chá de Casa Nova da Thalyta</title>
<style>
body{
  font-family: Arial;
  background: #fff;
  text-align:center;
  margin:0;
  padding:0;
}
.capa{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
h1{
  color:#4b2e2e;
  font-size:40px;
}
button{
  padding:12px 25px;
  background:#4b2e2e;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}
.convite{
  display:none;
  padding:30px;
}
.presentes{
  max-width:500px;
  margin:auto;
  text-align:left;
}
.presente{
  background:#fff;
  border:1px solid #ddd;
  padding:10px;
  margin:5px;
  border-radius:5px;
  display:flex;
  justify-content:space-between;
}
input{
  padding:10px;
  width:200px;
  margin-top:10px;
}
</style>
</head>
<body>

<!-- TELA INICIAL -->
<div class="capa">
  <h1>Chá de Casa Nova da Thalyta</h1>
  <p>🏠</p>
  <button id="btnAbrir">Abrir Convite</button>
</div>

<!-- CONVITE -->
<div class="convite" id="convite">
  <h2>Você está convidado!</h2>
  <p>“Consagre ao Senhor tudo o que você faz,<br>e os seus planos serão bem-sucedidos.”</p>
  <p><b>Provérbios 16:3</b></p>

  <input id="nome" placeholder="Digite seu nome"><br><br>
  <button id="btnConfirmar">Confirmar presença</button>

  <h3>Lista de Presentes</h3>
  <div class="presentes" id="lista"></div>
</div>

<!-- SCRIPT FINAL -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script>
window.addEventListener('DOMContentLoaded', function(){

  // Inicializar Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCP5ERJWlkYf45OdEMbjzHTDfmCYLn3mLA",
    authDomain: "cha-thalyta.firebaseapp.com",
    projectId: "cha-thalyta",
    storageBucket: "cha-thalyta.firebasestorage.app",
    messagingSenderId: "478303290064",
    appId: "1:478303290064:web:4eb61b841d9c03b8dc54d5",
    measurementId: "G-FT0C3L616Q"
  };
  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Botão abrir convite
  document.getElementById('btnAbrir').addEventListener('click', function(){
    document.querySelector('.capa').style.display='none';
    document.getElementById('convite').style.display='block';
  });

  // Botão confirmar no WhatsApp
  document.getElementById('btnConfirmar').addEventListener('click', function(){
    const nome = document.getElementById('nome').value;
    const msg = Olá! Eu ${nome} confirmo presença no Chá de Casa da Thalyta!;
    window.open(https://wa.me/5583996407861?text=${encodeURIComponent(msg)});
  });

  // Carregar presentes do Firebase
  const lista = document.getElementById("lista");
  db.collection("chá de casa").get().then((querySnapshot) => {
    querySnapshot.forEach((doc) => {
      const data = doc.data();
      if(data.disponivel){
        lista.innerHTML += <div class="presente">${data.nome}</div>;
      }
    });
  }).catch(err => console.error("Erro ao carregar presentes:", err));

});
</script>

</body>
</html>
